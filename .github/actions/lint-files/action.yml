name: Lint Files
description: Lint and format files using biome

inputs:
  fix:
    description: Whether to auto-fix lint issues
    required: false
    default: 'false'

outputs:
  changed-or-failed:
    description: Whether files were changed or lint errors remain
    value: ${{ steps.lint.outputs.changed-or-failed }}

runs:
  using: composite
  steps:
    - name: Run linters
      id: lint
      shell: bash
      run: |
        set +eou pipefail
        HAS_ERRORS=false
        FIX="${{ inputs.fix }}"

        if [ "$FIX" = "true" ]; then
          mise run lint || HAS_ERRORS=true
        else
          mise run lint-check || HAS_ERRORS=true
        fi

        # Check if any files were changed by auto-fix
        HAS_CHANGES=false
        if [ -n "$(git status --porcelain)" ]; then
          HAS_CHANGES=true
        fi

        # Output true if files changed OR errors remain
        if [ "$HAS_ERRORS" = "true" ] || [ "$HAS_CHANGES" = "true" ]; then
          echo "changed-or-failed=true" >> $GITHUB_OUTPUT
        else
          echo "changed-or-failed=false" >> $GITHUB_OUTPUT
        fi
