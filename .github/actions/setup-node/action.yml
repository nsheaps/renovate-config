name: "Setup Node.js"
description: "Setup Node.js with mise, corepack, and install dependencies"

runs:
  using: "composite"
  steps:
    - name: Setup mise
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
      with:
        install: true
        cache: true

    - name: Enable Corepack
      shell: bash
      run: |
        corepack enable
        corepack install
        # Regenerate shims so mise picks up the corepack-managed yarn
        mise reshim

    - name: Install dependencies
      shell: bash
      run: yarn install --frozen-lockfile
